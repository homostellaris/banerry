name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CYPRESS_video: 'true'
      CYPRESS_OTP_OVERRIDE: 12345678
      GOOGLE_AI_API_KEY: test-key
      STUB_APIS: 'true'
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_MqLkbV0wF7v097wNC80cm6ka
      VERCEL_PROJECT_ID: prj_q9F4a1oam7pZrQ2d5ieUjkw3HOrB
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Configure Vercel credentials
        run: |
          mkdir -p ~/.local/share/com.vercel.cli
          echo '{"token":"${{ secrets.VERCEL_TOKEN }}"}' > ~/.local/share/com.vercel.cli/auth.json
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun typecheck
      - name: Lint
        run: bun lint
      - name: Unit tests
        run: bun unit
      - name: Component tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          component: true
          command: bunx cypress run --component
      - name: Upload component test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-component-videos
          path: cypress/videos/
      - name: Integration tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: bun start -p 6604
          wait-on: http://localhost:6604
          command: bun cypress run
          build: bun run build
      - name: Upload integration test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-integration-videos
          path: cypress/videos/
